name: Daily Cumulative Report

on:
  schedule:
    - cron: '5 0 * * *' # Run daily at 00:05 UTC (start of new day)
  workflow_dispatch:

jobs:
  generate-cumulative:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Generate Cumulative Report
        run: |
          PYTHONPATH=. python scripts/generate_cumulative_report.py

      - name: Commit and Push Cumulative Report
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Automated daily cumulative report generation"
            git push
          fi
