name: Hourly Secret Scan

on:
  schedule:
    - cron: '0 * * * *' # Run hourly
  workflow_dispatch:
    inputs:
      scan_count:
        description: 'Number of repositories to scan'
        required: false
        default: '1'

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Tests
        run: |
          PYTHONPATH=. pytest

  scan-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    needs: test
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Discover New Repositories
        run: |
          PYTHONPATH=. python scripts/discover_repos.py

      - name: Run Hourly Scan
        env:
          SCAN_COUNT: ${{ github.event.inputs.scan_count || '1' }}
        run: |
          PYTHONPATH=. python scripts/run_daily_scan.py --scan-count $SCAN_COUNT

      - name: Commit and Push Reports
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p reports
          git add data/target_repos.json data/scan_state.json reports/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Automated hourly secret scan reports and repo updates"
            git push
          fi

      - name: Send Email Notification
        if: always() && env.NOTIFY_EMAIL != ''
        env:
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "GitHub Hourly Secret Scan - Run Status: ${{ job.status }}"
          to: ${{ secrets.NOTIFY_EMAIL }}
          from: "GitHub Actions <${{ secrets.MAIL_USERNAME }}>"
          body: |
            The hourly secret scan workflow has completed.
            Status: ${{ job.status }}
            Check the repository for the latest reports.
